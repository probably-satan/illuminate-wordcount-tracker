name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Validate production URL variable
        run: |
          if [ -z "${{ vars.PROD_URL }}" ]; then
            echo "Missing repository variable PROD_URL"
            exit 1
          fi

      - name: Validate Azure deployment token secret
        env:
          TOKEN_SCOPED: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 }}
          TOKEN_GENERIC: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$TOKEN_SCOPED" ] && [ -z "$TOKEN_GENERIC" ]; then
            echo "Missing Azure Static Web Apps token secret. Set AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 or AZURE_STATIC_WEB_APPS_API_TOKEN."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build
        env:
          PROD_URL: ${{ vars.PROD_URL }}

      - name: Deploy to Azure Static Web Apps (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Deploy to Azure Static Web Apps (attempt 2)
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
