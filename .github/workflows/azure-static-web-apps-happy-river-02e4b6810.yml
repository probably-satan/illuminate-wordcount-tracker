name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Validate production URL variable
        run: |
          if [ -z "${{ vars.PROD_URL }}" ]; then
            echo "Missing repository variable PROD_URL"
            exit 1
          fi

      - name: Validate Azure deployment token secret
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 }}" ]; then
            echo "Missing repository secret AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build production assets
        run: npm run build
        env:
          PROD_URL: ${{ vars.PROD_URL }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist
          output_location: ""
          skip_app_build: true
