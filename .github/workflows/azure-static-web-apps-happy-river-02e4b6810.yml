name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Validate production URL variable
        run: |
          if [ -z "${{ vars.PROD_URL }}" ]; then
            echo "Missing repository variable PROD_URL"
            exit 1
          fi

      - name: Validate Azure deployment token secret
        run: |
          if [ -z "${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 }}" ]; then
            echo "Missing repository secret AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install OIDC client
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get GitHub id token
        uses: actions/github-script@v7
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Build production assets
        run: npm run build
        env:
          PROD_URL: ${{ vars.PROD_URL }}

      - name: Deploy to Azure Static Web Apps (attempt 1)
        id: deploy_attempt_1
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          github_id_token: ${{ steps.idtoken.outputs.result }}
          action: upload
          app_location: dist
          skip_app_build: true

      - name: Deploy to Azure Static Web Apps (attempt 2)
        if: steps.deploy_attempt_1.outcome == 'failure'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_RIVER_02E4B6810 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          github_id_token: ${{ steps.idtoken.outputs.result }}
          action: upload
          app_location: dist
          skip_app_build: true
